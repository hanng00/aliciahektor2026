<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toastmaster & Toastmadame – Alicia & Hektor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alata&family=Bagel+Fat+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f9f1d7;
        --blue: #004aad;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: var(--cream);
        color: var(--blue);
        font-family: "Alata", sans-serif;
      }
      main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1.5rem;
      }
      .eyebrow {
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-size: 0.85rem;
        margin: 0 0 1rem;
        opacity: 0.7;
      }
      h1 {
        font-family: "Bagel Fat One", cursive;
        font-weight: 400;
        font-size: clamp(2.5rem, 8vw, 5rem);
        line-height: 1;
        margin: 0;
      }
      p.body {
        max-width: 32rem;
        margin: 1.25rem auto 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }
      .btn {
        display: inline-block;
        margin-top: 1.5rem;
        background: var(--blue);
        color: var(--cream);
        text-decoration: none;
        padding: 0.8rem 1.6rem;
        border-radius: 9999px;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        box-shadow: 0 10px 25px rgba(0, 30, 80, 0.22);
      }
      a.back {
        margin-top: 2rem;
        color: var(--blue);
        text-decoration: none;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-size: 0.8rem;
        opacity: 0.6;
      }
      a.back:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">toastmaster &amp; toastmadame</p>
      <h1>Toastmaster &amp; Toastmadame</h1>
      <p class="body">
        Kontakta toastmaster och toastmadame om du vill hålla tal eller dylikt på <span>toast@aliciahektor2026.se</span>
      </p>
      <a class="btn" href="mailto:toast@aliciahektor2026.se">
        Skicka mejl
      </a>
      <p class="body">eller nå Hannes på 076-328 11 70</p>
      <a class="back" href="/">— tillbaka —</a>
    </main>
  </body>
</html>
