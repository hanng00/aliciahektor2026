<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alicia & Hektor 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alata&family=Bagel+Fat+One&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f9f1d7;
        --blue: #004aad;
        --white: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--cream);
        color: var(--blue);
        font-family: "Alata", sans-serif;
        min-height: 100vh;
      }

      main {
        max-width: 48rem;
        margin: 0 auto;
        padding: 0.5rem 1rem 3rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .topnav {
        display: flex;
        justify-content: center;
        gap: 1rem;
        padding: 1.25rem 0.5rem 0.25rem;
        flex-wrap: wrap;
      }
      .topnav a {
        color: var(--blue);
        text-decoration: none;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-size: 1.05rem;
        font-weight: 700;
        opacity: 0.8;
        padding: 0.75rem 1rem;
        display: inline-block;
      }
      .topnav a:hover { opacity: 1; }

      .hero {
        position: relative;
        width: 100vw;
        margin-left: calc(50% - 50vw);
        margin-right: calc(50% - 50vw);
        margin-bottom: 0.5rem;
      }
      .hero-text {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
        pointer-events: none;
      }
      .hero-text h1,
      .hero-text .year {
        margin: 0;
        color: var(--blue);
      }
      .photos {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
        gap: clamp(0.4rem, 1.5vw, 1.2rem);
        padding: 1rem;
      }
      .photos figure {
        margin: 0;
        position: relative;
        overflow: hidden;
        height: 75vh;
        aspect-ratio: 166 / 1000;
        filter: drop-shadow(0 8px 18px rgba(0, 30, 80, 0.22));
      }
      .photos figure:nth-child(odd) {
        transform: rotate(-2deg);
      }
      .photos figure:nth-child(even) {
        transform: rotate(2deg) translateY(10px);
      }
      .photos figure img {
        position: absolute;
        display: block;
        width: 625%;
        height: auto;
        left: -262.5%;
        top: -17.5%;
      }

      h1 {
        font-family: "Bagel Fat One", cursive;
        font-size: clamp(3rem, 9vw, 6rem);
        font-weight: 400;
        line-height: 1;
        margin: 1rem 0 0;
        color: var(--blue);
        letter-spacing: 0.01em;
      }
      .year {
        font-family: "Bagel Fat One", cursive;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 400;
        margin: 0;
        color: var(--blue);
      }
      .subtitle {
        font-size: 1rem;
        margin: 0;
        max-width: 32rem;
        opacity: 0.85;
      }
      .btn {
        display: inline-block;
        background: var(--blue);
        color: var(--cream);
        text-decoration: none;
        padding: 0.8rem 1.6rem;
        border-radius: 9999px;
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        box-shadow: 0 10px 25px rgba(0, 30, 80, 0.22);
        transition: transform 0.15s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
      }

      .osa-card {
        width: 100%;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(6px);
        border-radius: 1.25rem;
        box-shadow: 0 25px 50px -12px rgba(0, 30, 80, 0.22);
        padding: 2rem;
        color: var(--blue);
        text-align: left;
      }
      .osa-card h2 {
        font-family: "Bagel Fat One", cursive;
        font-size: 1.9rem;
        font-weight: 400;
        margin: 0 0 1rem;
        text-align: center;
        letter-spacing: 0.02em;
      }
      .person {
        border: 1px solid rgba(0, 74, 173, 0.18);
        border-radius: 0.75rem;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .person legend {
        font-weight: 700;
        padding: 0 0.4rem;
        letter-spacing: 0.04em;
      }
      .person label {
        display: block;
        font-size: 0.85rem;
        margin: 0.75rem 0 0.25rem;
        letter-spacing: 0.05em;
      }
      .person input,
      .person select,
      .person textarea {
        width: 100%;
        font: inherit;
        padding: 0.55rem 0.75rem;
        border: 1px solid rgba(0, 74, 173, 0.25);
        border-radius: 0.5rem;
        background: white;
        color: var(--blue);
      }
      .person input:focus,
      .person select:focus,
      .person textarea:focus {
        outline: 2px solid var(--blue);
        outline-offset: 1px;
      }
      .person textarea {
        resize: vertical;
        min-height: 3rem;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .actions {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 1rem;
      }
      .btn-secondary,
      .btn-submit {
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.05em;
        padding: 0.7rem 1.2rem;
        border-radius: 9999px;
        border: 0;
        cursor: pointer;
      }
      .btn-secondary {
        background: transparent;
        color: var(--blue);
        border: 1px solid var(--blue);
      }
      .btn-submit {
        background: var(--blue);
        color: var(--cream);
        box-shadow: 0 10px 25px rgba(0, 30, 80, 0.22);
      }
      .btn-submit:hover,
      .btn-secondary:hover {
        filter: brightness(0.95);
      }

      .foot {
        font-size: 0.9rem;
        margin-top: 1rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav class="topnav">
      <a href="/info/">Info</a>
      <a href="/toast/">Kontakta Toastmaster &amp; Toastmadame</a>
      <a href="/osa/">OSA</a>
    </nav>
    <main>
      <section class="hero">
        <div class="photos" aria-hidden="true">
          <figure><img src="Untitled design - 1.png" alt="" /></figure>
          <figure><img src="Untitled design - 2.png" alt="" /></figure>
          <figure><img src="Untitled design - 3.png" alt="" /></figure>
          <figure><img src="Untitled design - 4.png" alt="" /></figure>
          <figure><img src="Untitled design - 5.png" alt="" /></figure>
          <figure><img src="Untitled design - 6.png" alt="" /></figure>
          <figure><img src="Untitled design - 7.png" alt="" /></figure>
          <figure><img src="Untitled design - 8.png" alt="" /></figure>
          <figure><img src="Untitled design - 9.png" alt="" /></figure>
        </div>
        <div class="hero-text">
          <h1>Alicia &amp; Hektor</h1>
          <p class="year">2026</p>
        </div>
      </section>

    </main>

  </body>
</html>
